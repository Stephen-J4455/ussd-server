<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mystiwan USSD Server</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f7fb;
        color: #1f2937;
      }
      .wrap {
        max-width: 720px;
        margin: 48px auto;
        padding: 24px;
      }
      .card {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        padding: 24px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.5rem;
      }
      p {
        margin: 0 0 16px;
        line-height: 1.5;
      }
      a {
        color: #0f766e;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      ul {
        margin: 0;
        padding-left: 20px;
      }
      li {
        margin: 8px 0;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Mystiwan USSD Server</h1>
        <p>This endpoint host is online. Use the USSD routes below for gateway integration.</p>
        <ul>
          <li>Health: <a href="/health">/health</a></li>
          <li>USSD Session: /ussd</li>
          <li>USSD Events: /ussd/callback</li>
        </ul>
      </section>
    </main>
  </body>
</html>
